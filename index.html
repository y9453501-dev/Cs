<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS 1.6 Ultra Fixed</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #111; touch-action: none; }
        
        /* GUI CONTROLS */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .touch-btn { pointer-events: auto; position: absolute; border: 3px solid white; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-family: sans-serif; }
        
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        
        /* ATTACK BUTTON (RED) */
        #attack-btn {
            bottom: 120px; right: 40px; width: 90px; height: 90px;
            background: rgba(255, 0, 0, 0.6) url('https://cdn-icons-png.flaticon.com/512/1004/1004664.png') no-repeat center;
            background-size: 60%;
        }

        #jump-btn { bottom: 40px; right: 140px; width: 75px; height: 75px; background: rgba(255, 255, 255, 0.2); }

        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; justify-content: center; align-items: center; }
        #play-btn { padding: 15px 50px; background: #d32f2f; color: white; border: none; font-size: 20px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen"><button id="play-btn">START CS 1.6</button></div>

    <div id="ui-layer">
        <div id="joystick-zone"></div>
        <div id="attack-btn" class="touch-btn"></div>
        <div id="jump-btn" class="touch-btn">JUMP</div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
        <a-assets>
            <a-asset-item id="map-file" src="harita.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#222"></a-sky>

        <a-entity gltf-model="#map-file" position="0 0 0" scale="1 1 1"></a-entity>

        <a-entity id="player" position="0 1.6 0">
            <a-entity id="cam" camera look-controls="reverseTouchDrag: true">
                <a-entity geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.012"
                          material="color: #00ff00; shader: flat" position="0 0 -1"></a-entity>
                
                <a-entity id="hand" position="0.3 -0.4 -0.6">
                    <a-box width="0.1" height="0.1" depth="0.5" color="#333" id="gun-model"></a-box>
                </a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const player = document.getElementById('player');
        const cam = document.getElementById('cam');
        const hand = document.getElementById('hand');

        document.getElementById('play-btn').onclick = () => {
            document.getElementById('start-screen').style.display = 'none';
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        };

        // ATTACK LOGIC
        document.getElementById('attack-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            hand.setAttribute('animation', "property: rotation; from: 0 0 0; to: -20 0 0; dur: 100; dir: alternate; loop: 2");
        });

        // JUMP LOGIC
        let vY = 0, jumping = false;
        document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(!jumping) { vY = 0.22; jumping = true; }
        });

        // JOYSTICK MOVEMENT
        let mF = 0, mS = 0;
        nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'white' })
        .on('move', (e, d) => {
            mF = -Math.sin(d.angle.radian) * d.force * 0.1;
            mS = -Math.cos(d.angle.radian) * d.force * 0.1;
        }).on('end', () => { mF = 0; mS = 0; });

        function gameLoop() {
            if (mF || mS) {
                const rot = cam.getAttribute('rotation');
                const rad = rot.y * (Math.PI / 180);
                const pos = player.getAttribute('position');
                pos.x += (mF * Math.sin(rad) + mS * Math.cos(rad));
                pos.z += (mF * Math.cos(rad) - mS * Math.sin(rad));
                player.setAttribute('position', pos);
            }
            
            // Gravity
            const pos = player.getAttribute('position');
            if (jumping || pos.y > 1.6) {
                pos.y += vY; vY -= 0.012;
                if (pos.y <= 1.6) { pos.y = 1.6; jumping = false; vY = 0; }
                player.setAttribute('position', pos);
            }
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
